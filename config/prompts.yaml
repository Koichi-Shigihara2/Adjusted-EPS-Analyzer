# config/prompts.yaml
# AI アナリスト設定 — このファイルを編集するだけでプロンプトを変更可能

# 使用モデル (xAI Grok)
# 選択肢: grok-3, grok-3-mini, grok-2
model: "grok-3-mini"

# 健全性評価の追加インストラクション
health_evaluation: |
  評価基準:
  - Excellent: 調整項目が明確に一過性・非現金で、連続発生していない。本質的収益力の成長が読み取れる。
  - Good: 標準的な調整（SBC・減損・リストラ等）で、根拠が明確。特段の問題なし。
  - Caution: 同一項目が複数四半期連続発生、または調整額が純利益の50%超、または珍しい項目が多い。
  - Warning: 調整項目が明らかに利益水増しに見える、または調整後EPSがGAAP EPSの2倍超かつ根拠が薄弱。

# AI コメントの追加指示
analysis_prompt: |
  - 各調整項目が「本当に一過性か」を厳密に判断すること。
  - SBC(株式報酬)が純利益の30%超の場合は必ず指摘すること。
  - 連続するCaution評価は特に強調し、投資家への注意喚起を促すこと。
  - 原文スニペット(Snippet)を必ず各調整項目の根拠として引用すること。
  - 出力は必ず指定されたJSON形式のみとすること（前後の説明文は不要）。
