sectors:
# =============================================
# テクノロジー / 半導体（新規追加）
# =============================================
- name: Technology
  keywords:
  - NVDA
  - AMD
  - INTC
  - MSFT
  - GOOGL
  - GOOG
  - META
  - AAPL
  - TECH
  - SEMICONDUCTOR
  sic_codes:
  - '3674'   # Semiconductors
  - '7370'   # Computer programming services
  - '7371'   # Computer programming services
  - '7372'   # Prepackaged software
  - '7373'   # Computer integrated systems design
  exclusions:
  # テクノロジー企業は SBC + 無形資産償却 のみ調整
  # 以下の項目は調整対象外（除外）とする
  - item_id: inventory_writeoff
    reason: 在庫評価損は半導体では事業サイクルの一部
    criteria:
    - operating
  - item_id: gov_subsidy_timing
    reason: 政府補助金は継続的な事業支援
    criteria:
    - operating
  - item_id: fx_gains_losses
    reason: 為替変動は継続的に発生
    criteria:
    - operating
  - item_id: derivative_gains_losses
    reason: デリバティブは継続的なヘッジ活動
    criteria:
    - operating
  - item_id: tax_one_time
    reason: 繰延税金は継続的に発生
    criteria:
    - operating

# =============================================
# ハイパーグロース / SaaS
# =============================================
- name: ハイパーグロース / SaaS
  keywords:
  - PLTR
  - SNOW
  - CRWD
  - DDOG
  - CLOUD
  - APP
  - SAAS
  - SOUN
  sic_codes:
  - '7370'
  - '7372'
  - '7373'
  exclusions:
  - item_id: sbc
    reason: 株式報酬費用 - 現金支出を伴わず、将来の希薄化は株式数で調整済み
    criteria:
    - non_cash
    - non_recurring
    maturity_watch: true
  - item_id: amortization_intangibles
    reason: 無形資産償却費 - 買収関連の非現金費用
    criteria:
    - non_cash
  # 以下は除外（調整しない）
  - item_id: inventory_writeoff
    reason: SaaS企業には在庫がほぼない
    criteria:
    - not_applicable
  - item_id: gov_subsidy_timing
    reason: 政府補助金は稀
    criteria:
    - not_applicable

# =============================================
# フィンテック / 銀行
# =============================================
- name: フィンテック / 銀行
  keywords:
  - SOFI
  - NU
  - AFRM
  - UPST
  - FINTECH
  - BANK
  sic_codes:
  - '6020'
  - '6021'
  - '6022'
  - '6199'
  - '6159'
  exclusions:
  - item_id: loan_fair_value
    reason: ローン公正価値評価損益 - 市場金利変動による一時的評価替え
    criteria:
    - non_operating
    - non_recurring
  - item_id: loan_loss_provision_abnormal
    reason: 貸倒引当金繰入の異常変動 - マクロ変動による一時的影響
    criteria:
    - non_recurring
  # 銀行ではSBCは除外しない（希薄化コストとして実質的）

# =============================================
# ヘルスケア / バイオ
# =============================================
- name: ヘルスケア / バイオ
  keywords:
  - VRTX
  - PFE
  - REGN
  - BMRN
  - BIO
  - PHARMA
  sic_codes:
  - '2834'
  - '2835'
  - '2836'
  exclusions:
  - item_id: ma_integration
    reason: M&A統合費用 - 一過性の買収関連コスト
    criteria:
    - non_recurring
    - non_cash
  - item_id: iprd_amortization
    reason: IPR&D償却 - 買収に伴う無形資産償却
    criteria:
    - non_cash
    - non_recurring

# =============================================
# 一般消費財 / 製造 / EV
# =============================================
- name: 一般消費財 / 製造 / EV
  keywords:
  - TSLA
  - CELH
  - RIVN
  - LCID
  - INDUSTRIAL
  - EV
  - CONSUMER
  sic_codes:
  - '3711'   # Motor vehicles
  - '2080'   # Beverages
  - '2086'   # Bottled soft drinks
  exclusions:
  - item_id: inventory_writeoff
    reason: 在庫評価損・減損 - サプライチェーン混乱による一過性コスト
    criteria:
    - non_recurring
  - item_id: gov_subsidy_timing
    reason: 政府補助金の一時的影響 - タイミング差による変動
    criteria:
    - non_recurring

# =============================================
# 宇宙・航空
# =============================================
- name: 宇宙・航空
  keywords:
  - RKLB
  - SPCE
  - ASTR
  - SPACE
  - AEROSPACE
  sic_codes:
  - '3760'   # Guided missiles and space vehicles
  - '3761'
  exclusions:
  - item_id: sbc
    reason: 株式報酬費用 - 非現金費用
    criteria:
    - non_cash
    maturity_watch: true
  - item_id: amortization_intangibles
    reason: 無形資産償却費
    criteria:
    - non_cash

# =============================================
# 不動産 (REITs)
# =============================================
- name: 不動産 (REITs)
  keywords:
  - O
  - AMT
  - PLD
  - REIT
  - PROPERTY
  sic_codes:
  - '6798'
  exclusions:
  - item_id: depreciation
    reason: 減価償却費 - 不動産の実態価値維持のため会計上の減価を除外（FFO/AFFO基準）
    criteria:
    - non_cash
  - item_id: asset_sale_gain
    reason: 資産売却損益・減損 - 非経常的な資産入替
    criteria:
    - non_recurring
    - non_operating

# =============================================
# 暗号資産 / ブロックチェーン
# =============================================
- name: 暗号資産 / ブロックチェーン
  keywords:
  - COIN
  - MSTR
  - MARA
  - RIOT
  - CRYPTO
  exclusions:
  - item_id: crypto_fair_value
    reason: 暗号資産公正価値変動損益 - 非営業性の評価変動
    criteria:
    - non_operating
    - non_recurring
  - item_id: impairment_legacy
    reason: 減損（旧基準下） - 会計基準変更に伴う一過性影響
    criteria:
    - non_cash
    - non_recurring

# =============================================
# 通信・インフラ
# =============================================
- name: 通信・インフラ
  keywords:
  - ONDS
  - INFRASTRUCTURE
  - TELECOM
  sic_codes:
  - '4812'
  - '4813'
  exclusions:
  - item_id: sbc
    reason: 株式報酬費用
    criteria:
    - non_cash
    maturity_watch: true
  - item_id: amortization_intangibles
    reason: 無形資産償却費
    criteria:
    - non_cash
