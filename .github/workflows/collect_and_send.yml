name: Market Pulse Data Update

on:
  schedule:
    # 豈取律 08:00 JST・亥燕譌･繝・・繧ｿ蜿門ｾ暦ｼ・
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser yfinance requests

      - name: Run collect_and_send
        env:
          XAI_API_KEY:     ${{ secrets.XAI_API_KEY }}
          GMAIL_USER:      ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD:  ${{ secrets.GMAIL_PASSWORD }}
        run: |
          python -m market.market_pulse.collect_and_send

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/market-monitor/data/
          git diff --staged --quiet || git commit -m "chore: auto-update market pulse data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
