
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spidey Bot - PLTR Analysis Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .chart-container { position: relative; height: 50vh; width: 100%; margin-top: 30px; }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; padding: 20px; background: #eef2f5; border-radius: 8px; }
        .stat-box { text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 PLTR Inflection Point Tracker</h1>
        <div class="stats">
            <div class="stat-box">
                <div>最新の売上 (Revenue)</div>
                <div class="stat-value">$4,475,446,000</div>
            </div>
            <div class="stat-box">
                <div>最新の営業CF (CFO)</div>
                <div class="stat-value">$2,134,473,000</div>
            </div>
            <div class="stat-box">
                <div>分析実行回数</div>
                <div class="stat-value">2 回</div>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="metricsChart"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('metricsChart').getContext('2d');
        const metricsChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ["2026-04-02", "2026-04-03"],
                datasets: [
                    {
                        label: 'Revenue (売上)',
                        data: [0, 4475446000],
                        borderColor: 'rgba(52, 152, 219, 1)',
                        backgroundColor: 'rgba(52, 152, 219, 0.2)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true
                    },
                    {
                        label: 'CFO (営業キャッシュフロー)',
                        data: [0, 2134473000],
                        borderColor: 'rgba(46, 204, 113, 1)',
                        backgroundColor: 'rgba(46, 204, 113, 0.2)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: 'USD' }
                    }
                },
                plugins: {
                    legend: { position: 'top' }
                }
            }
        });
    </script>
</body>
</html>
