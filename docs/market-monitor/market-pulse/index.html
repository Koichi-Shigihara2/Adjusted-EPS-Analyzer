<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARKET PULSE · 市場サマリー</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    :root {
      --bg:   #0a0d14;
      --sur:  #111520;
      --sur2: #161c2d;
      --bdr:  #1e2840;
      --acc:  #3b82f6;
      --grn:  #10b981;
      --red:  #f43f5e;
      --amb:  #f59e0b;
      --pur:  #a78bfa;
      --cyn:  #22d3ee;
      --txt:  #e2e8f0;
      --mut:  #64748b;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;

      /* 指標カラー */
      --c-vix:  #f43f5e;
      --c-sp:   #3b82f6;
      --c-y10:  #10b981;
      --c-jpy:  #f59e0b;
      --c-oil:  #a78bfa;

      /* 判定カラー */
      --sunny:  #f59e0b;
      --cloudy: #64748b;
      --storm:  #f43f5e;

      /* センチメントカラー */
      --fear:    #f43f5e;
      --caution: #f59e0b;
      --neutral: #64748b;
      --greed-c: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--bdr);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .logo {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .15em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo img { height: 28px; width: auto; }
    .logo-dot {
      width: 8px; height: 8px;
      background: var(--acc);
      border-radius: 50%;
      animation: pdot 2s ease-in-out infinite;
    }
    @keyframes pdot {
      0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,.4); }
      50%      { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
    }
    .nav-links { display: flex; gap: 16px; }
    .nav-links a {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--mut);
      text-decoration: none;
      letter-spacing: .08em;
      padding: 4px 0;
      border-bottom: 1px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--acc);
      border-bottom-color: var(--acc);
    }

    /* ── SHELL ──────────────────────────────────────────── */
    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── SECTION LABEL ──────────────────────────────────── */
    .sec {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .2em;
      color: var(--mut);
      text-transform: uppercase;
      margin: 28px 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sec::after { content:''; flex:1; height:1px; background:var(--bdr); }

    /* ════════════════════════════════════════════════════════
       SENTIMENT HERO SECTION
       ════════════════════════════════════════════════════════ */
    .hero-sentiment {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      margin-bottom: 8px;
    }
    @media (max-width: 900px) {
      .hero-sentiment { grid-template-columns: 1fr; }
    }

    /* ── GAUGE CARD ─────────────────────────────────────── */
    .gauge-card {
      background: var(--sur);
      border: 1px solid var(--bdr);
      padding: 20px 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .gauge-title {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .2em;
      color: var(--mut);
      text-transform: uppercase;
      margin-bottom: 12px;
      align-self: flex-start;
    }
    .gauge-svg-wrap {
      position: relative;
      width: 260px;
      height: 148px;
    }
    .gauge-svg-wrap svg {
      width: 100%;
      height: 100%;
    }
    .gauge-center {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    .gauge-score {
      font-family: var(--mono);
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
    }
    .gauge-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      margin-top: 2px;
    }
    .gauge-delta {
      font-family: var(--mono);
      font-size: 10px;
      margin-top: 2px;
    }

    /* サブスコアバー */
    .sub-scores {
      width: 100%;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sub-row {
      display: grid;
      grid-template-columns: 90px 1fr 32px;
      align-items: center;
      gap: 8px;
    }
    .sub-name {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: .08em;
      color: var(--mut);
      text-transform: uppercase;
      text-align: right;
    }
    .sub-bar-bg {
      height: 6px;
      background: rgba(30,40,64,.8);
      position: relative;
      overflow: hidden;
    }
    .sub-bar-fill {
      height: 100%;
      transition: width .6s ease;
    }
    .sub-val {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--mut);
      text-align: right;
    }

    /* ブレッスサマリー */
    .breadth-summary {
      width: 100%;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--bdr);
    }
    .breadth-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 0;
    }
    .breadth-label {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: .06em;
      color: var(--mut);
      text-transform: uppercase;
    }
    .breadth-val {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
    }
    .breadth-ad-bar {
      display: flex;
      height: 4px;
      width: 100%;
      margin: 4px 0 2px;
      gap: 1px;
    }
    .breadth-ad-bar .adv-fill {
      background: var(--grn);
      height: 100%;
    }
    .breadth-ad-bar .dec-fill {
      background: var(--red);
      height: 100%;
    }

    /* ── OSCILLATOR CARD ───────────────────────────────── */
    .osc-card {
      background: var(--sur);
      border: 1px solid var(--bdr);
      padding: 16px;
      display: flex;
      flex-direction: column;
    }
    .osc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .osc-title {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .15em;
      color: var(--mut);
      text-transform: uppercase;
    }
    .osc-period-btns { display: flex; gap: 2px; }
    .osc-period-btn {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .06em;
      padding: 3px 8px;
      border: 1px solid var(--bdr);
      background: var(--sur);
      color: var(--mut);
      cursor: pointer;
      transition: all .12s;
    }
    .osc-period-btn:hover { border-color: var(--acc); color: var(--acc); }
    .osc-period-btn.active {
      background: rgba(59,130,246,.12);
      border-color: var(--acc);
      color: var(--acc);
    }
    .osc-chart-wrap {
      flex: 1;
      position: relative;
      min-height: 180px;
    }
    .osc-legend {
      display: flex;
      gap: 14px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .osc-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--mut);
    }
    .osc-legend-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .osc-zone-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .osc-zone-label {
      font-family: var(--mono);
      font-size: 7px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* ── TOP BAR ────────────────────────────────────────── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .phase-pills { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
    .phase-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px;
      border: 1px solid var(--bdr);
      background: var(--sur);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .05em;
      color: var(--mut);
    }
    .phase-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
    .pill-sunny  { border-color: rgba(245,158,11,.4);  color: var(--amb); }
    .pill-sunny  .dot { background: var(--amb); box-shadow: 0 0 4px var(--amb); }
    .pill-cloudy { border-color: rgba(100,116,139,.4); color: var(--mut); }
    .pill-cloudy .dot { background: var(--mut); }
    .pill-storm  { border-color: rgba(244,63,94,.4);   color: var(--red); }
    .pill-storm  .dot { background: var(--red); box-shadow: 0 0 4px var(--red); }
    .pill-total  { border-color: var(--bdr); color: var(--mut); }

    /* 期間ボタン */
    .period-group { display: flex; gap: 2px; }
    .period-btn {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .06em;
      padding: 4px 10px;
      border: 1px solid var(--bdr);
      background: var(--sur);
      color: var(--mut);
      cursor: pointer;
      transition: all .12s;
    }
    .period-btn:hover { border-color: var(--acc); color: var(--acc); }
    .period-btn.active {
      background: rgba(59,130,246,.12);
      border-color: var(--acc);
      color: var(--acc);
    }

    /* ── MAIN LAYOUT ────────────────────────────────────── */
    .main-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      align-items: start;
    }

    /* ── TIMELINE PANEL ─────────────────────────────────── */
    .timeline-panel {
      background: var(--sur);
      border: 1px solid var(--bdr);
    }
    .tl-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--bdr);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tl-header-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .15em;
      color: var(--mut);
      text-transform: uppercase;
    }
    .tl-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--mut);
    }

    /* タイムラインアイテム */
    .tl-item {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(30,40,64,.6);
      cursor: pointer;
      transition: background .1s;
      display: grid;
      grid-template-columns: 20px 1fr auto;
      gap: 8px;
      align-items: start;
    }
    .tl-item:last-child { border-bottom: none; }
    .tl-item:hover { background: var(--sur2); }
    .tl-item.active { background: rgba(59,130,246,.08); border-left: 2px solid var(--acc); }

    /* ビジュアルインジケーター（左列） */
    .tl-vis {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding-top: 2px;
    }
    .tl-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .tl-dot.sunny  { background: var(--amb); box-shadow: 0 0 5px rgba(245,158,11,.5); }
    .tl-dot.cloudy { background: var(--mut); }
    .tl-dot.storm  { background: var(--red); box-shadow: 0 0 5px rgba(244,63,94,.6); animation: pulse-red 1.5s ease-in-out infinite; }
    @keyframes pulse-red {
      0%,100% { box-shadow: 0 0 4px rgba(244,63,94,.4); }
      50%      { box-shadow: 0 0 10px rgba(244,63,94,.8); }
    }
    .tl-line {
      width: 1px;
      flex: 1;
      min-height: 8px;
      background: var(--bdr);
    }
    /* VIXバー（右端視覚化） */
    .tl-vix-bar-wrap {
      width: 28px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      padding-top: 3px;
    }
    .tl-vix-val {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--txt);
      text-align: right;
    }
    .tl-vix-chg {
      font-family: var(--mono);
      font-size: 9px;
      text-align: right;
    }
    .up   { color: var(--red); }
    .down { color: var(--grn); }
    .flat { color: var(--mut); }

    .tl-main {}
    .tl-date {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--mut);
      letter-spacing: .04em;
    }
    .tl-judgment {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      margin: 1px 0 3px;
    }
    .tl-judgment.sunny  { color: var(--amb); }
    .tl-judgment.cloudy { color: var(--mut); }
    .tl-judgment.storm  { color: var(--red); }
    .tl-haiku {
      font-size: 10px;
      color: var(--mut);
      line-height: 1.4;
      font-style: italic;
    }

    /* ── RIGHT COLUMN ───────────────────────────────────── */
    .right-col { display: flex; flex-direction: column; gap: 14px; }

    /* メトリクスカード */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 10px;
    }
    .metric-card {
      background: var(--sur);
      border: 1px solid var(--bdr);
      padding: 12px 14px;
    }
    .metric-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .12em;
      color: var(--mut);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .metric-value {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--txt);
      line-height: 1;
    }
    .metric-chg {
      font-family: var(--mono);
      font-size: 10px;
      margin-top: 4px;
    }

    /* ── CHART CARD ─────────────────────────────────────── */
    .chart-card {
      background: var(--sur);
      border: 1px solid var(--bdr);
      padding: 16px;
    }
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chart-title {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .15em;
      color: var(--mut);
      text-transform: uppercase;
    }
    .chart-metric-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .metric-btn {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 9px;
      border: 1px solid var(--bdr);
      background: var(--sur2);
      color: var(--mut);
      cursor: pointer;
      transition: all .12s;
      display: flex; align-items: center; gap: 5px;
    }
    .metric-btn:hover { border-color: var(--acc); color: var(--acc); }
    .metric-btn.active { background: var(--sur2); }
    .metric-btn .mbdot {
      width: 7px; height: 7px; border-radius: 50%;
      transition: box-shadow .12s;
    }
    .metric-btn.active .mbdot { box-shadow: 0 0 5px currentColor; }
    .chart-wrap { position: relative; height: 200px; }

    /* 凡例 */
    .chart-legend {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-top: 10px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--mono); font-size: 10px; color: var(--mut);
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ── DETAIL CARD ────────────────────────────────────── */
    .detail-card {
      background: var(--sur);
      border: 1px solid var(--bdr);
      padding: 16px;
    }
    .detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--bdr);
      padding-bottom: 12px;
    }
    .detail-phase-badge {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .08em;
      padding: 3px 10px;
      border: 1px solid;
    }
    .detail-phase-badge.sunny  { border-color: rgba(245,158,11,.5); color: var(--amb); background: rgba(245,158,11,.07); }
    .detail-phase-badge.cloudy { border-color: rgba(100,116,139,.5); color: var(--mut); background: rgba(100,116,139,.07); }
    .detail-phase-badge.storm  { border-color: rgba(244,63,94,.5);  color: var(--red); background: rgba(244,63,94,.07); }
    .detail-title-text {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--mut);
      letter-spacing: .06em;
    }

    .credit-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .credit-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .06em;
      padding: 3px 9px;
      border: 1px solid;
    }
    .risk-on  { border-color: rgba(16,185,129,.4);  color: var(--grn); background: rgba(16,185,129,.07); }
    .risk-off { border-color: rgba(244,63,94,.4);   color: var(--red); background: rgba(244,63,94,.07); }

    .detail-body {
      font-size: 13px;
      color: var(--txt);
      line-height: 1.8;
      white-space: pre-wrap;
      font-family: var(--sans);
      max-height: 420px;
      overflow-y: auto;
    }
    .detail-body::-webkit-scrollbar { width: 4px; }
    .detail-body::-webkit-scrollbar-track { background: var(--sur); }
    .detail-body::-webkit-scrollbar-thumb { background: var(--bdr); }

    .haiku-box {
      margin-top: 14px;
      padding: 10px 14px;
      border-left: 2px solid var(--acc);
      background: rgba(59,130,246,.06);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--acc);
      letter-spacing: .06em;
    }

    .placeholder-msg {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--mut);
      letter-spacing: .06em;
      padding: 40px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="../common/images/logo.png" alt="TANUKI"
         style="height:28px;width:auto;vertical-align:middle"
         onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'\uD83E\uDD9D',style:'font-size:22px;line-height:1'}))">
    <span class="logo-dot"></span>
    MARKET PULSE
  </div>
  <div class="nav-links">
    <a href="/On-a-journey/">HOME</a>
        <a href="/On-a-journey/value-monitor/adjusted_eps_analyzer/">EPS Analyzer</a>
    <a href="#" class="active">Market Pulse</a>
        <a href="/On-a-journey/market-monitor/macro-pulse/">MACRO PULSE</a>
  </div>
</header>

<div class="shell">

  <!-- ═══ SENTIMENT HERO ═══ -->
  <div class="sec">sentiment oscillator</div>

  <div class="hero-sentiment">

    <!-- ゲージ -->
    <div class="gauge-card">
      <div class="gauge-title">Market Sentiment Index</div>
      <div class="gauge-svg-wrap">
        <svg viewBox="0 0 260 148" id="gaugeSvg">
          <defs>
            <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#f43f5e"/>
              <stop offset="25%"  stop-color="#f59e0b"/>
              <stop offset="50%"  stop-color="#64748b"/>
              <stop offset="75%"  stop-color="#22d3ee"/>
              <stop offset="100%" stop-color="#10b981"/>
            </linearGradient>
          </defs>
          <!-- 背景アーク -->
          <path d="M 26 132 A 104 104 0 0 1 234 132" fill="none" stroke="#1e2840" stroke-width="14" stroke-linecap="round"/>
          <!-- カラーアーク -->
          <path d="M 26 132 A 104 104 0 0 1 234 132" fill="none" stroke="url(#gaugeGrad)" stroke-width="14" stroke-linecap="round" opacity="0.35"/>
          <!-- 針 -->
          <line id="gaugeNeedle" x1="130" y1="132" x2="130" y2="36" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" transform="rotate(-90, 130, 132)" style="transition: transform 1s ease-out"/>
          <circle cx="130" cy="132" r="5" fill="#e2e8f0"/>
          <!-- ゾーンラベル -->
          <text x="18" y="146" fill="#f43f5e" font-family="'Space Mono',monospace" font-size="7" letter-spacing=".06em">FEAR</text>
          <text x="204" y="146" fill="#10b981" font-family="'Space Mono',monospace" font-size="7" letter-spacing=".06em">GREED</text>
        </svg>

  if (score <= 20) return "#f43f5e";
  if (score <= 35) return "#fb7185";
  if (score <= 50) return "#f59e0b";
  if (score <= 65) return "#64748b";
  if (score <= 80) return "#22d3ee";
  return "#10b981";
}

// ══════════════════════════════════════════════════════════════════════════════
// 期間フィルタ
// ══════════════════════════════════════════════════════════════════════════════
function applyPeriod() {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - periodDays);
  filteredData = periodDays>=9999 ? [...allData]
    : allData.filter(d => new Date(d.date) >= cutoff);
  if (!filteredData.length) filteredData = [...allData];
  selectedIdx = filteredData.length - 1;
}

// ══════════════════════════════════════════════════════════════════════════════
// 期間ボタン
// ══════════════════════════════════════════════════════════════════════════════
function renderPeriodGroup() {
  document.getElementById("periodGroup").innerHTML = PERIODS.map(p =>
    `<button class="period-btn ${p.days===periodDays?"active":""}"
      onclick="switchPeriod(${p.days})">${p.label}</button>`
  ).join("");
}
function switchPeriod(days) {
  periodDays = days;
  applyPeriod();
  renderAll();
}

// ══════════════════════════════════════════════════════════════════════════════
// フェーズ集計
// ══════════════════════════════════════════════════════════════════════════════
function renderPhasePills() {
  const c = {"晴れ":0,"曇り":0,"嵐":0};
  filteredData.forEach(d => { if (c[d.judgment]!=null) c[d.judgment]++; });
  document.getElementById("phasePills").innerHTML =
    Object.entries(c).filter(([,v])=>v>0).map(([k,v]) =>
      `<div class="phase-pill pill-${phaseClass(k)}">
        <span class="dot"></span>${phaseLabel(k)} <strong>${v}日</strong>
      </div>`).join("") +
    `<div class="phase-pill pill-total">計 ${filteredData.length} 日</div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// タイムライン
// ══════════════════════════════════════════════════════════════════════════════
function renderTimeline() {
  document.getElementById("tlCount").textContent = `${filteredData.length} 件`;
  const rev = [...filteredData].reverse();
  document.getElementById("timeline").innerHTML = rev.map((d, ri) => {
    const i = filteredData.length - 1 - ri;
    const vix = d.indicators["VIX指数"];
    const chg = fmtChg(vix?.change_percent);
    const pc  = phaseClass(d.judgment);
    const isLast = ri === rev.length - 1;
    return `<div class="tl-item ${i===selectedIdx?"active":""}" onclick="selectItem(${i})">
      <div class="tl-vis">
        <div class="tl-dot ${pc}"></div>
        ${!isLast ? '<div class="tl-line"></div>' : ''}
      </div>
      <div class="tl-main">
        <div class="tl-date">${fmtDateFull(d.date)}</div>
        <div class="tl-judgment ${pc}">${phaseLabel(d.judgment)}</div>
        ${d.haiku ? `<div class="tl-haiku">${d.haiku}</div>` : ""}
      </div>
      <div class="tl-vix-bar-wrap">
        <div class="tl-vix-val">${vix ? vix.value.toFixed(2) : "-"}</div>
        <div class="tl-vix-chg ${chg.cls}">${chg.text}</div>
      </div>
    </div>`;
  }).join("");
}

// ══════════════════════════════════════════════════════════════════════════════
// メトリクス
// ══════════════════════════════════════════════════════════════════════════════
function renderMetrics() {
  const d = filteredData[selectedIdx];
  const SHOW  = ["VIX指数","S&P500","米10年債","ドル円"];
  const SHORT = {"VIX指数":"VIX","S&P500":"S&P500","米10年債":"10Y利回","ドル円":"USD/JPY"};
  document.getElementById("metricsRow").innerHTML = SHOW.map(k => {
    const ind = d?.indicators[k];
    if (!ind) return `<div class="metric-card"><div class="metric-label">${SHORT[k]}</div><div class="metric-value">—</div></div>`;
    const chg = fmtChg(ind.change_percent);
    const val = ind.value>=1000
      ? ind.value.toLocaleString("ja-JP",{maximumFractionDigits:0})
      : ind.value.toFixed(2);
    const mdef = METRIC_DEFS.find(m=>m.key===k);
    return `<div class="metric-card">
      <div class="metric-label" style="color:${mdef?.color||'var(--mut)'}">${SHORT[k]}</div>
      <div class="metric-value">${val}</div>
      <div class="metric-chg ${chg.cls}">${chg.text}</div>
    </div>`;
  }).join("");
}

// ══════════════════════════════════════════════════════════════════════════════
// チャートボタン
// ══════════════════════════════════════════════════════════════════════════════
function renderMetricBtns() {
  document.getElementById("metricBtns").innerHTML = METRIC_DEFS.map(m =>
    `<button class="metric-btn ${activeMetrics.has(m.key)?"active":""}"
      onclick="toggleMetric('${m.key}')"
      style="color:${activeMetrics.has(m.key)?m.color:'var(--mut)'};
             border-color:${activeMetrics.has(m.key)?m.color+'80':'var(--bdr)'}">
      <span class="mbdot" style="background:${m.color}"></span>${m.label}
    </button>`
  ).join("");
}
function toggleMetric(key) {
  if (activeMetrics.has(key)) {
    if (activeMetrics.size <= 1) return;
    activeMetrics.delete(key);
  } else {
    activeMetrics.add(key);
  }
  renderMetricBtns();
  renderChart();
  renderLegend();
}

// ══════════════════════════════════════════════════════════════════════════════
// チャート
// ══════════════════════════════════════════════════════════════════════════════
function renderChart() {
  const labels = filteredData.map(d => fmtDate(d.date));
  const datasets = METRIC_DEFS.filter(m => activeMetrics.has(m.key)).map(m => {
    const raw = filteredData.map(d => d.indicators[m.key]?.value ?? null);
    const valid = raw.filter(v=>v!=null);
    const mn = Math.min(...valid), mx = Math.max(...valid);
    const normed = raw.map(v => v==null ? null : mx===mn ? 50 : (v-mn)/(mx-mn)*80+10);
    const judgments = filteredData.map(d=>d.judgment);
    return {
      label: m.label,
      data: activeMetrics.size>1 ? normed : raw,
      borderColor: m.color,
      pointBackgroundColor: judgments.map(j =>
        j==="嵐"?"#f43f5e": j==="晴れ"?"#f59e0b": m.color),
      pointBorderColor: "transparent",
      pointRadius: filteredData.length>40 ? 2 : 4,
      pointHoverRadius: 6,
      borderWidth: 1.5,
      fill: false,
      tension: 0.35,
      _rawData: raw,
      _meta: m,
    };
  });

  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById("mainChart"), {
    type:"line",
    data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:"index", intersect:false },
      plugins:{
        legend:{ display:false },
        tooltip:{
          backgroundColor:"#111520",
          borderColor:"#1e2840",
          borderWidth:1,
          titleColor:"#64748b",
          bodyColor:"#e2e8f0",
          titleFont:{ family:"Space Mono", size:10 },
          bodyFont:{ family:"Space Mono", size:11 },
          callbacks:{
            label: ctx => {
              const ds = ctx.dataset;
              const raw = ds._rawData?.[ctx.dataIndex];
              const j = filteredData[ctx.dataIndex]?.judgment;
              return ` ${ds._meta?.label||ds.label}: ${raw!=null?raw.toFixed(2):"—"} (${j})`;
            }
          }
        }
      },
      scales:{
        x:{
          ticks:{ color:"#64748b", font:{family:"Space Mono",size:10}, maxTicksLimit:10 },
          grid:{ color:"rgba(30,40,64,.5)" },
          border:{ color:"#1e2840" }
        },
        y:{
          display: activeMetrics.size>1 ? false : true,
          ticks:{ color:"#64748b", font:{family:"Space Mono",size:10} },
          grid:{ color:"rgba(30,40,64,.5)" },
          border:{ color:"#1e2840" }
        }
      },
      onClick:(_, els) => { if(els.length) selectItem(els[0].index); }
    }
  });
}

function renderLegend() {
  const active = METRIC_DEFS.filter(m=>activeMetrics.has(m.key));
  const note = activeMetrics.size>1 ? ' <span style="color:var(--mut);font-size:9px">（正規化表示）</span>' : '';
  document.getElementById("chartLegend").innerHTML =
    active.map(m =>
      `<div class="legend-item">
        <div class="legend-dot" style="background:${m.color}"></div>${m.label}
      </div>`
    ).join("") + note;
}

// ══════════════════════════════════════════════════════════════════════════════
// 詳細パネル
// ══════════════════════════════════════════════════════════════════════════════
function renderDetail() {
  const d = filteredData[selectedIdx];
  const pc = phaseClass(d.judgment);
  const { stock, bond, credit } = d.credit || {};
  const creditHTML = d.credit ? `
    <div class="credit-row">
      <span class="credit-badge ${stock==='リスクオン'?'risk-on':'risk-off'}">株 ${stock}</span>
      <span class="credit-badge ${bond==='リスクオン'?'risk-on':'risk-off'}">債券 ${bond}</span>
      <span class="credit-badge ${credit==='リスクオン'?'risk-on':'risk-off'}">クレジット ${credit}</span>
    </div>` : "";

  document.getElementById("detailInner").innerHTML = `
    <div class="detail-header">
      <span class="detail-phase-badge ${pc}">${phaseLabel(d.judgment)}</span>
      <span class="detail-title-text">${fmtDateFull(d.date)}</span>
    </div>
    ${creditHTML}
    <div class="detail-body">${d.summary ?? "詳細なし"}</div>
    ${d.haiku ? `<div class="haiku-box">${d.haiku}</div>` : ""}
  `;
}

// ══════════════════════════════════════════════════════════════════════════════
// SENTIMENT GAUGE
// ══════════════════════════════════════════════════════════════════════════════
function renderGauge() {
  const latest = filteredData[filteredData.length - 1];
  if (!latest?.sentiment) {
    document.getElementById("gaugeScore").textContent = "—";
    document.getElementById("gaugeLabel").textContent = "NO DATA";
    document.getElementById("gaugeDelta").textContent = "";
    document.getElementById("subScores").innerHTML = "";
    return;
  }

  const s = latest.sentiment;
  const score = s.score;
  const color = sentimentColor(score);

  // 針の角度: 0→-90°, 100→+90°
  const angle = (score / 100) * 180 - 90;
  document.getElementById("gaugeNeedle").setAttribute("transform", `rotate(${angle}, 130, 132)`);

  document.getElementById("gaugeScore").textContent = score.toFixed(0);
  document.getElementById("gaugeScore").style.color = color;
  document.getElementById("gaugeLabel").textContent = s.label;
  document.getElementById("gaugeLabel").style.color = color;

  // 前日差
  if (filteredData.length >= 2) {
    const prev = filteredData[filteredData.length - 2]?.sentiment?.score;
    if (prev != null) {
      const delta = score - prev;
      const arrow = delta > 0 ? "\u25B2" : delta < 0 ? "\u25BC" : "\u25B6";
      const cls = delta > 0.5 ? "down" : delta < -0.5 ? "up" : "flat"; // VIXとは逆（スコア上昇=良い）
      document.getElementById("gaugeDelta").innerHTML = `<span class="${delta>0?'down':'up'}">${arrow} ${delta>0?'+':''}${delta.toFixed(1)}pt vs prev</span>`;
    }
  }

  // サブスコアバー
  const subs = s.sub_scores || {};
  document.getElementById("subScores").innerHTML = Object.entries(subs).map(([k, v]) => {
    const sc = v.score;
    const c = sentimentColor(sc);
    return `<div class="sub-row">
      <div class="sub-name">${SUB_SCORE_NAMES[k] || k}</div>
      <div class="sub-bar-bg"><div class="sub-bar-fill" style="width:${sc}%;background:${c}"></div></div>
      <div class="sub-val">${sc.toFixed(0)}</div>
    </div>`;
  }).join("");

  // ブレッスサマリー
  const b = s.breadth;
  if (b && b.advances != null) {
    const total = b.advances + b.declines;
    const advPct = total > 0 ? (b.advances / total * 100) : 50;
    const decPct = total > 0 ? (b.declines / total * 100) : 50;
    document.getElementById("breadthSummary").innerHTML = `
      <div class="breadth-row">
        <span class="breadth-label">S&P500 Breadth (${b.date || ''})</span>
      </div>
      <div class="breadth-ad-bar">
        <div class="adv-fill" style="width:${advPct}%"></div>
        <div class="dec-fill" style="width:${decPct}%"></div>
      </div>
      <div class="breadth-row">
        <span class="breadth-label">\u25B2 ${b.advances}</span>
        <span class="breadth-label">AD(5d) ${b.ad_ratio_5d || '-'}</span>
        <span class="breadth-label">\u25BC ${b.declines}</span>
      </div>
      <div class="breadth-row" style="margin-top:4px">
        <span class="breadth-val" style="color:var(--grn)">NH ${b.new_highs_52w || 0}</span>
        <span class="breadth-val" style="color:${(b.nh_nl_diff||0)>=0?'var(--grn)':'var(--red)'}">${(b.nh_nl_diff||0)>=0?'+':''}${b.nh_nl_diff||0}</span>
        <span class="breadth-val" style="color:var(--red)">NL ${b.new_lows_52w || 0}</span>
      </div>
      ${b.pct_above_50ma != null ? `<div class="breadth-row" style="margin-top:2px">
        <span class="breadth-label">&gt;50MA ${b.pct_above_50ma}%</span>
        ${b.pct_above_200ma != null ? `<span class="breadth-label">&gt;200MA ${b.pct_above_200ma}%</span>` : ''}
      </div>` : ''}
    `;
  } else {
    document.getElementById("breadthSummary").innerHTML = "";
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// SENTIMENT OSCILLATOR CHART
// ══════════════════════════════════════════════════════════════════════════════
function renderOscPeriodBtns() {
  document.getElementById("oscPeriodBtns").innerHTML = OSC_PERIODS.map(p =>
    `<button class="osc-period-btn ${p.days===oscDays?"active":""}"
      onclick="switchOscPeriod(${p.days})">${p.label}</button>`
  ).join("");
}
function switchOscPeriod(days) {
  oscDays = days;
  renderOscPeriodBtns();
  renderOscChart();
}

function renderOscChart() {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - oscDays);
  const oscData = oscDays >= 9999 ? [...allData]
    : allData.filter(d => new Date(d.date) >= cutoff);
  if (!oscData.length) return;

  const labels = oscData.map(d => fmtDate(d.date));
  const scores = oscData.map(d => d.sentiment?.score ?? null);
  const colors = scores.map(s => s != null ? sentimentColor(s) : "#64748b");

  if (oscChartInst) oscChartInst.destroy();
  oscChartInst = new Chart(document.getElementById("oscChart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: "Sentiment",
          data: scores,
          borderColor: "#3b82f6",
          backgroundColor: ctx => {
            const idx = ctx.dataIndex;
            return colors[idx] || "#3b82f6";
          },
          pointBackgroundColor: colors,
          pointBorderColor: "transparent",
          pointRadius: oscData.length > 40 ? 2 : 5,
          pointHoverRadius: 7,
          borderWidth: 2,
          fill: false,
          tension: 0.3,
          segment: {
            borderColor: ctx => {
              const s = scores[ctx.p0DataIndex];
              return s != null ? sentimentColor(s) : "#64748b";
            }
          }
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#111520",
          borderColor: "#1e2840",
          borderWidth: 1,
          titleColor: "#64748b",
          bodyColor: "#e2e8f0",
          titleFont: { family: "Space Mono", size: 10 },
          bodyFont: { family: "Space Mono", size: 11 },
          callbacks: {
            label: ctx => {
              const sc = scores[ctx.dataIndex];
              const d = oscData[ctx.dataIndex];
              const lbl = d?.sentiment?.label || "";
              return sc != null ? ` Score: ${sc.toFixed(1)} (${lbl})` : " —";
            }
          }
        },
        annotation: undefined
      },
      scales: {
        x: {
          ticks: { color: "#64748b", font: { family: "Space Mono", size: 9 }, maxTicksLimit: 12 },
          grid: { color: "rgba(30,40,64,.5)" },
          border: { color: "#1e2840" }
        },
        y: {
          min: 0,
          max: 100,
          ticks: {
            color: "#64748b",
            font: { family: "Space Mono", size: 9 },
            stepSize: 20,
            callback: v => {
              if (v === 0) return "0";
              if (v === 20) return "FEAR";
              if (v === 50) return "50";
              if (v === 80) return "GREED";
              if (v === 100) return "100";
              return "";
            }
          },
          grid: {
            color: ctx => {
              if (ctx.tick.value === 35) return "rgba(244,63,94,.2)";
              if (ctx.tick.value === 65) return "rgba(16,185,129,.2)";
              return "rgba(30,40,64,.5)";
            }
          },
          border: { color: "#1e2840" }
        }
      }
    },
    plugins: [{
      id: "zoneShading",
      beforeDraw(chart) {
        const { ctx, chartArea: { left, right, top, bottom }, scales: { y } } = chart;
        // Fear zone (0-35)
        const y35 = y.getPixelForValue(35);
        const yBottom = y.getPixelForValue(0);
        ctx.fillStyle = "rgba(244,63,94,.06)";
        ctx.fillRect(left, y35, right - left, yBottom - y35);
        // Greed zone (65-100)
        const y65 = y.getPixelForValue(65);
        const yTop = y.getPixelForValue(100);
        ctx.fillStyle = "rgba(16,185,129,.06)";
        ctx.fillRect(left, yTop, right - left, y65 - yTop);
        // Threshold lines
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(244,63,94,.3)";
        ctx.beginPath(); ctx.moveTo(left, y35); ctx.lineTo(right, y35); ctx.stroke();
        ctx.strokeStyle = "rgba(16,185,129,.3)";
        ctx.beginPath(); ctx.moveTo(left, y65); ctx.lineTo(right, y65); ctx.stroke();
        ctx.setLineDash([]);
      }
    }]
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// アイテム選択
// ══════════════════════════════════════════════════════════════════════════════
function selectItem(i) {
  selectedIdx = i;
  renderTimeline();
  renderMetrics();
  renderDetail();
}

// ══════════════════════════════════════════════════════════════════════════════
// 全再描画
// ══════════════════════════════════════════════════════════════════════════════
function renderAll() {
  renderGauge();
  renderOscPeriodBtns();
  renderOscChart();
  renderPeriodGroup();
  renderPhasePills();
  renderTimeline();
  renderMetrics();
  renderMetricBtns();
  renderChart();
  renderLegend();
  renderDetail();
}

// ══════════════════════════════════════════════════════════════════════════════
// データロード
// ══════════════════════════════════════════════════════════════════════════════
async function init() {
  try {
    const resp = await fetch('./data/market_data.json');
    const json = await resp.json();
    if (Array.isArray(json) && json.length > 0) {
      allData = json
        .map(d => {
          // judgment の表記ゆれを正規化
          const j = d.judgment || "不明";
          d.judgment = j === "曇" ? "曇り" : j === "晴" ? "晴れ" : j;
          // credit が無い場合は summary から簡易推定
          if (!d.credit) {
            const s = d.summary || "";
            const st = s.includes("株（S&P500の方向）は下落") ? "リスクオフ" : "リスクオン";
            const bo = s.includes("債券（米10年債利回りの方向）は上昇") ? "リスクオフ" : "リスクオン";
            const cr = s.includes("クレジット（HYG対LQD比の方向）は上昇") ? "リスクオン" : "リスクオフ";
            d.credit = { stock: st, bond: bo, credit: cr };
          }
          // sentiment が無い場合は簡易算出（後方互換）
          if (!d.sentiment) {
            const vix = d.indicators?.["VIX指数"]?.value;
            if (vix != null) {
              const vixScore = Math.max(0, Math.min(1, (35 - vix) / 23)) * 100;
              const score = Math.round(vixScore * 0.6 + 20);
              const label = score <= 20 ? "EXTREME FEAR" : score <= 35 ? "FEAR" : score <= 50 ? "CAUTION" : score <= 65 ? "NEUTRAL" : score <= 80 ? "GREED" : "EXTREME GREED";
              d.sentiment = { score, label, sub_scores: { vix_level: { score: Math.round(vixScore), weight: 0.30, raw: vix } } };
            } else {
              d.sentiment = { score: 50, label: "NEUTRAL", sub_scores: {} };
            }
          }
          return d;
        })
        .sort((a,b) => new Date(a.date) - new Date(b.date));
    } else {
      allData = makeSample();
    }
  } catch { allData = makeSample(); }
  applyPeriod();
  renderAll();
}

init();
</script>
