  <script>
    let currentTicker = 'PLTR';
    let quarterlyData = null;
    let annualData = null;
    let ttmData = null;
    let chart = null;

    function showLoading(show) { /* 省略 */ }

    async function loadTicker(ticker = null) { /* 省略 */ }

    function updateHeader(data) { /* 省略 */ }

    function updateMetrics(data) { /* 省略 */ }

    function formatLabel(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length < 2) return dateStr;
      const [year, month] = parts;
      const quarter = Math.floor((parseInt(month) - 1) / 3) + 1;
      return `${year}-Q${quarter}`;
    }

    function updateChart(dataArray, type, labelField) {
      const ctx = document.getElementById('eps-chart').getContext('2d'); // ★ 関数の先頭でctxを取得

      if (!dataArray || dataArray.length === 0) {
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: 'line',
          data: { labels: [], datasets: [] },
          options: { plugins: { legend: { display: false } } }
        });
        return;
      }

      // 古い順にソート（昇順）
      const sorted = [...dataArray].sort((a, b) => a[labelField].localeCompare(b[labelField]));

      const labels = sorted.map(item => formatLabel(item[labelField]));
      let gaapData, adjData;

      if (type === 'quarterly') {
        gaapData = sorted.map(item => item.gaap_eps);
        adjData = sorted.map(item => item.adjusted_eps);
      } else if (type === 'ttm') {
        gaapData = sorted.map(item => item.eps);
        adjData = sorted.map(item => item.adjusted_eps);
      } else if (type === 'annual') {
        gaapData = sorted.map(item => item.gaap_eps);
        adjData = sorted.map(item => item.adjusted_eps);
      } else {
        return;
      }

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'GAAP EPS',
              data: gaapData,
              borderColor: 'rgb(156, 163, 175)',
              backgroundColor: 'rgba(156, 163, 175, 0.1)',
              tension: 0.1
            },
            {
              label: 'Adjusted EPS',
              data: adjData,
              borderColor: 'rgb(34, 197, 94)',
              backgroundColor: 'rgba(34, 197, 94, 0.1)',
              tension: 0.1
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: 'white' } }
          },
          scales: {
            y: { 
              grid: { color: 'rgba(255, 255, 255, 0.1)' }, 
              ticks: { color: 'white' },
              beginAtZero: false
            },
            x: { 
              grid: { color: 'rgba(255, 255, 255, 0.1)' }, 
              ticks: { color: 'white', maxRotation: 45, maxTicksLimit: 15 }
            }
          }
        }
      });
    }

    function updateAI(ai) { /* 省略 */ }

    window.onload = () => loadTicker('PLTR');
  </script>
