<script>
  async function loadTickers() {
    const tickers = ["MSFT","AMZN","SOFI","TSLA","PLTR","CELH","NVDA","AMD","APP","SOUN","RKLB","ONDS","FIG"];
    const container = document.getElementById('ticker-list');
    
    for (let ticker of tickers) {
      const card = document.createElement('a');
      card.href = `stock.html?ticker=${ticker}`;
      card.className = 'ticker-card';
      card.innerHTML = `
        <div class="ticker-name">${ticker}</div>
        <div class="value" id="val-${ticker}">計算中...</div>
        <div class="status">最新更新: <span id="date-${ticker}">--</span></div>
      `;
      container.appendChild(card);
      
      // latest.jsonを動的に読み込み（$表示に変更）
      try {
        const res = await fetch(`data/${ticker}/latest.json`);
        const data = await res.json();
        const valEl = document.getElementById(`val-${ticker}`);
        const dateEl = document.getElementById(`date-${ticker}`);
        valEl.textContent = `$${data.intrinsic_value_pt.toLocaleString('en-US')}`;
        dateEl.textContent = data.calculation_date || '--';
      } catch(e) {
        document.getElementById(`val-${ticker}`).textContent = 'データなし';
      }
    }
  }
  loadTickers();
</script>
